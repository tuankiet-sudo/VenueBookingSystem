services:
  # Backend - NestJS Web Service
  - type: web
    name: venue-booking-api
    runtime: node
    rootDir: .
    buildCommand: corepack yarn install && corepack yarn workspace api build
    startCommand: node apps/server/dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        sync: false

  # Frontend - Vite/React Static Site
  - type: web
    name: venue-booking-web
    runtime: static
    rootDir: .
    buildCommand: corepack yarn install && corepack yarn build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
